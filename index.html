<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores de Bach - Sistema Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>🌿 Flores de Bach</h1>
            <p>Sistema profesional de generación de informes</p>
        </header>
        
        <main class="main-content">
            <div class="input-section">
                <label for="flores-input">Introduce las flores seleccionadas:</label>
                <textarea 
                    id="flores-input" 
                    placeholder="Ejemplo: Wild Oat, Olive, Hornbeam, Walnut"
                    rows="4"
                ></textarea>
                <button id="generar-btn" class="btn-primary">
                    Generar Informe Profesional
                </button>
            </div>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Generando informe profesional...</p>
            </div>
            
            <div id="resultado" class="resultado-section hidden">
                <div class="resultado-header">
                    <h3>Informe Generado:</h3>
                    <div class="botones-copiar">
                        <button class="btn-copiar" data-formato="texto">📋 Texto</button>
                        <button class="btn-copiar" data-formato="html">📋 HTML</button>
                        <button class="btn-copiar" data-formato="markdown">📋 Markdown</button>
                    </div>
                </div>
                <div class="informe-contenido">
                    <pre id="texto-resultado"></pre>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
