<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Flores de Bach - Sistema Profesional</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>🌿 Flores de Bach</h1>
            <p>Sistema profesional de generación de informes</p>
            <h2>Maria Leon Terapeuta Holistica</h2>
        </header>
        
        <main class="main-content">
            <div class="input-section">
                <label>Selecciona las flores para el informe:</label>
                <div id="flores-grid" class="flores-grid"></div>
                <button id="generar-btn" class="btn-primary">
                    Generar Informe Profesional
                </button>
            </div>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Generando informe profesional...</p>
            </div>
            
            <div id="resultado" class="resultado-section hidden">
                <div class="resultado-header">
                <h3>Informe Generado:</h3>
                <div class="botones-accion">
                    <button class="btn-copiar" id="btn-copiar">📋 Copiar</button>
                    <button class="btn-compartir" id="btn-compartir">📱 Compartir por WhatsApp</button>
                </div>
            </div>
                <div class="informe-contenido">
                    <pre id="texto-resultado"></pre>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
