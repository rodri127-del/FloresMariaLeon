name: Deploy to Netlify

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies and build
      run: |
        # Reemplaza la API key en el archivo JavaScript
        sed -i "s/this.apiKey = '.*'/this.apiKey = '${{ secrets.GEMINI_API_KEY }}'/" script.js
        
        # Crea el archivo de construcción (puedes añadir más pasos de build si necesitas)
        mkdir -p dist
        cp index.html dist/
        cp style.css dist/ 
        cp script.js dist/

    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      with:
        args: deploy --dir=dist --prod
